<!DOCTYPE html>
<html>

<head>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

  <style>
    body {
      display: flex;
      margin: 0;
      font-family: Arial;
    }

    #left { flex: 1; }
    #right { flex: 1; }
  </style>

</head>

<body>

<div id="left"></div>

<div id="right">

  <!-- <div id="plot_pi" style="width:500px;height:250px;"></div> -->
  <!-- <div id="plot_pi" style="width:500px;height:250px;"></div> -->

  <div id="plot_container" style="width:500px;height:1000px;"></div>

</div>

<script>

let inside = 0;
let total = 0;

let piHist = [];
let errHist = [];
let xHist = [];
let pi;
let err;
let points = [];


function setup() {
  let canvas = createCanvas(500, 500);
  canvas.parent("left");
  //initPlot();
  initPlot2x1();
}

function draw() {

  background(255);

  let cx = width/2;
  let cy = height/2;
  let r = width/2;

  // geometry
  noFill();
  stroke(0);
  rect(0,0,width,height);
  ellipse(cx,cy,2*r,2*r);

  // throw darts
  for (let i = 0; i <= 200; i++) {
    let x = random(width);
    let y = random(height);

    total++;

    let dx = x - cx;
    let dy = y - cy;

    console.log(`Dart at (${dx.toFixed(2)}, ${dy.toFixed(2)})`);
    let isInside = (dx*dx + dy*dy <= r*r);

    if (isInside) inside++;

    points.push({x,y,inside:isInside});

    // estimate
    let p = inside / total;

    pi = 4 * p;

    err = abs(pi - PI);

    piHist.push(pi);
    errHist.push(err);
    xHist.push(total);
  }

  // draw darts (persistent)
  noStroke();
  for (let pt of points) {
    fill(pt.inside ? "red" : "blue");
    circle(pt.x, pt.y, 3);
  }

  //updatePlot();
  updatePlots2x1();
}


// ---------------- PLOT ----------------

function initPlot() {
  Plotly.newPlot("plot_pi", [
    {
      x: [],
      y: [],
      mode: "lines",
      name: "Pi estimate"
    },
  ], {
    title: "Monte Carlo Pi with Error Bars (Zoomed)",
    xaxis: {title: "Number of darts"},
    yaxis: {title: "Pi estimate"}
  });

  Plotly.newPlot("plot_error", [
    {
      x: [],
      y: [],
      mode: "lines",
      name: "Error in pi estimate"
    },
  ], {
    title: "Error in Pi Estimate",
    xaxis: {title: "Number of darts"},
    yaxis: {title: "Error"}
  });
}

function updatePlot() {
  let center = Math.PI;
  let yMin = pi - 10*err;
  let yMax = pi + 10*err;
  let length = xHist.length;


  Plotly.newPlot("plot_pi", [
    {
      x: xHist,
      y: piHist,
      mode: "lines",
      name: "π estimate"
    }
  ], {
    title: "Monte Carlo Pi with Shrinking Uncertainty",
    xaxis: {title: "Number of darts", range: [xHist[length-5000], xHist[length -1]]},
    yaxis: {
      title: "Pi estimate",
      range: [yMin, yMax]   // 👈 zoom effect
    }
  });

  Plotly.newPlot("plot_error", [
    {
      x: xHist,
      y: errHist,
      mode: "lines",
      name: "Error in pi estimate"
    },
  ], {
    title: "Error in Pi Estimate",
    xaxis: {title: "Number of darts", range: [xHist[length-5000], xHist[length -1]]},
    yaxis: {title: "Error",
      range: [0, 2*err]}   // 👈 zoom effect
  });

}

function initPlot2x1(){
Plotly.newPlot("plot_container", [

  // --- Top plot (π estimate) ---
  {
    x: [],
    y: [],
    mode: "lines",
    name: "Pi estimate",
    xaxis: "No of darts",
    yaxis: "Estimate of Pi"
  },

  // --- Bottom plot (error) ---
  {
    x: [],
    y: [],
    mode: "lines",
    name: "Error",
    xaxis: "Number of darts",
    yaxis: "Error"
  }

], {

  grid: {
    rows: 2,
    columns: 1,
    pattern: "independent"
  },

  // shared x-axis
  xaxis: {
    title: "Number of darts"
  },

  // top plot
  yaxis: {
    title: "Pi estimate"
  },

  // bottom plot
  yaxis2: {
    title: "Error"
  }

});

}


function updatePlots2x1(){
Plotly.react("plot_container", [

  // --- Top plot (π estimate) ---
  {
    x: xHist.slice(-200),
    y: piHist.slice(-200),
    mode: "lines",
    name: "Pi estimate",
    xaxis: "Number of darts",
    yaxis: "Pi estimate"
  },

  // --- Bottom plot (error) ---
  {
    x: xHist.slice(-200),
    y: errHist.slice(-200),
    mode: "lines",
    name: "Error",
    xaxis: "Number of darts",
    yaxis: "Error"
  }

], {

  grid: {
    rows: 2,
    columns: 1,
    pattern: "independent"
  },

  // shared x-axis
  xaxis: {
    title: "Number of darts"
  },

  // top plot
  yaxis: {
    title: "Pi estimate"
  },

  // bottom plot
  yaxis2: {
    title: "Error"
  }

});

}

</script>

</body>
</html>
